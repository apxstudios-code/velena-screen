<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<!-- YouTube Error 153 Fix: gültige Referrer-Policy, sonst blockt der Embed-Player -->
<meta name="referrer" content="strict-origin-when-cross-origin">
<style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
    #player    { position: absolute; inset: 0; width: 100%; height: 100%; display: none; }
    #twitch    { position: absolute; inset: 0; width: 100%; height: 100%; display: none; }
    #twitch iframe { width: 100%; height: 100%; }
    #img       { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: fill; display: none; }
    #vid       { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: fill; display: none; background: #000; }
</style>
</head>
<body>
<div id="player"></div>
<div id="twitch"></div>
<video id="vid" playsinline></video>
<img id="img" alt="">
<script>
    // DUI-Player: empfängt Befehle via SendDuiMessage (window message events)
    // Aktionen: play {videoId, start, volume, loop} | image {url} | volume {volume} | loop {loop} | stop
    let player    = null;
    let apiReady  = false;
    let pending   = null;   // gepufferter play-Befehl, bis YouTube-API bereit ist
    let looping   = false;
    let curVideo  = null;
    let syncBase  = null;   // Date.now()-Anker der gemeinsamen Zeitlinie (ms);
                            // Sollposition = (Date.now() - syncBase) / 1000

    const imgEl = document.getElementById('img');

    // YouTube IFrame API laden
    const tag = document.createElement('script');
    tag.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(tag);

    // YouTube-Host per URL-Parameter umschaltbar:
    //   ?ythost=yt       -> www.youtube.com       (weniger Bot-Checks, Risiko: Error 153)
    //   (ohne Parameter) -> www.youtube-nocookie  (sicher gegen Error 153)
    const ytHost = new URLSearchParams(location.search).get('ythost') === 'yt'
        ? 'https://www.youtube.com'
        : 'https://www.youtube-nocookie.com';

    window.onYouTubeIframeAPIReady = function () {
        player = new YT.Player('player', {
            width: '100%',
            height: '100%',
            host: ytHost,
            playerVars: {
                autoplay: 1, controls: 0, disablekb: 1, modestbranding: 1,
                rel: 0, iv_load_policy: 3, fs: 0, playsinline: 1
            },
            events: {
                onReady: function () {
                    apiReady = true;
                    if (pending) { doPlay(pending); pending = null; }
                },
                onStateChange: function (e) {
                    if (e.data === YT.PlayerState.ENDED && looping && curVideo) {
                        player.seekTo(0, true);
                        player.playVideo();
                    }
                }
            }
        });
    };

    function playerEl() {
        // YT.Player ersetzt #player durch ein iframe mit derselben ID
        return document.getElementById('player');
    }

    // ---------- Twitch ----------
    let twitch = null;
    let twitchApiRequested = false;
    let pendingTwitch = null;
    const twitchEl = document.getElementById('twitch');

    function killTwitch() {
        twitch = null;
        twitchEl.innerHTML = '';
        twitchEl.style.display = 'none';
    }

    function doTwitch(d) {
        if (!(window.Twitch && window.Twitch.Player)) {
            pendingTwitch = d;
            if (!twitchApiRequested) {
                twitchApiRequested = true;
                const s = document.createElement('script');
                s.src = 'https://player.twitch.tv/js/embed/v1.js';
                s.onload = function () {
                    if (pendingTwitch) { const p = pendingTwitch; pendingTwitch = null; doTwitch(p); }
                };
                document.head.appendChild(s);
            }
            return;
        }

        if (player && apiReady) { player.stopVideo(); }
        curVideo = null;
        syncBase = null; // Twitch synct sich selbst (live) bzw. via time-Param
        playerEl().style.display = 'none';
        imgEl.style.display = 'none';
        imgEl.src = '';
        looping = d.loop === true;

        killTwitch();
        twitchEl.style.display = 'block';

        const opts = {
            width: '100%', height: '100%',
            parent: [location.hostname],
            autoplay: true, muted: false
        };
        if (d.video) {
            opts.video = d.video;
            if (d.start && d.start > 0) { opts.time = Math.floor(d.start) + 's'; }
        } else {
            opts.channel = d.channel;
        }

        twitch = new Twitch.Player('twitch', opts);
        twitch.addEventListener(Twitch.Player.READY, function () {
            twitch.setMuted(false);
            twitch.setVolume(Math.max(0, Math.min(100, d.volume || 0)) / 100);
        });
        twitch.addEventListener(Twitch.Player.ENDED, function () {
            if (looping && d.video && twitch) {
                twitch.seek(0);
                twitch.play();
            }
        });
    }

    // ---------- Direkte Videodatei (mp4/webm – werbefrei) ----------
    const vidEl = document.getElementById('vid');

    function killVideo() {
        vidEl.pause();
        vidEl.removeAttribute('src');
        vidEl.load();
        vidEl.style.display = 'none';
    }

    vidEl.addEventListener('ended', function () {
        if (looping) { vidEl.currentTime = 0; vidEl.play(); }
    });

    function doFile(d) {
        if (player && apiReady) { player.stopVideo(); }
        killTwitch();
        curVideo = null;
        playerEl().style.display = 'none';
        imgEl.style.display = 'none';
        imgEl.src = '';
        looping = d.loop === true;

        // Zeitlinien-Anker: berücksichtigt auch die Zeit zwischen
        // Nachrichten-Eingang (d._t) und tatsächlichem Start
        syncBase = (d._t || Date.now()) - (d.start || 0) * 1000;

        vidEl.style.display = 'block';
        vidEl.loop = looping;
        vidEl.volume = Math.max(0, Math.min(100, d.volume || 0)) / 100;
        vidEl.src = d.url;
        vidEl.addEventListener('loadedmetadata', function once() {
            vidEl.removeEventListener('loadedmetadata', once);
            const target = (Date.now() - syncBase) / 1000;
            if (target > 0 && isFinite(vidEl.duration) && vidEl.duration > 0) {
                vidEl.currentTime = looping ? (target % vidEl.duration)
                    : Math.min(target, Math.max(vidEl.duration - 0.5, 0));
            }
            vidEl.play().catch(function () {});
        });
        vidEl.play().catch(function () {});
    }

    function doPlay(d) {
        killTwitch();
        killVideo();
        imgEl.style.display = 'none';
        imgEl.src = '';
        curVideo = d.videoId;
        looping  = d.loop === true;
        playerEl().style.display = 'block';

        // Zeitlinien-Anker (inkl. Wartezeit bis YT-API bereit war)
        syncBase = (d._t || Date.now()) - (d.start || 0) * 1000;
        const startNow = Math.max((Date.now() - syncBase) / 1000, 0);

        player.loadVideoById({ videoId: d.videoId, startSeconds: startNow });
        player.setVolume(Math.max(0, Math.min(100, d.volume || 0)));
        player.playVideo();
    }

    function doImage(url) {
        if (player && apiReady) { player.stopVideo(); }
        killTwitch();
        killVideo();
        curVideo = null;
        syncBase = null;
        playerEl().style.display = 'none';
        imgEl.src = url;
        imgEl.style.display = 'block';
    }

    function doStop() {
        if (player && apiReady) { player.stopVideo(); }
        killTwitch();
        killVideo();
        pendingTwitch = null;
        curVideo = null;
        syncBase = null;
        playerEl().style.display = 'none';
        imgEl.style.display = 'none';
        imgEl.src = '';
    }

    // Browser-Testmodus: Seite direkt mit Query-Parametern aufrufen, z.B.
    //   ?twitch=kanalname   oder   ?yt=VIDEOID   oder   ?img=https://...
    const qs = new URLSearchParams(location.search);
    if (qs.get('twitch')) { doTwitch({ channel: qs.get('twitch'), volume: 50 }); }
    if (qs.get('img'))    { doImage(qs.get('img')); }
    if (qs.get('yt'))     { pending = { videoId: qs.get('yt'), start: 0, volume: 50 }; }

    window.addEventListener('message', function (event) {
        const d = event.data;
        if (!d || !d.action) return;

        switch (d.action) {
            case 'play':
                d._t = Date.now(); // Eingangszeit für den Zeitlinien-Anker
                if (apiReady) { doPlay(d); } else { pending = d; }
                break;
            case 'twitch':
                doTwitch(d);
                break;
            case 'file':
                d._t = Date.now();
                doFile(d);
                break;
            case 'image':
                doImage(d.url);
                break;
            case 'volume': {
                const v = Math.max(0, Math.min(100, d.volume || 0));
                if (vidEl.style.display === 'block') { vidEl.volume = v / 100; }
                else if (twitch) { twitch.setVolume(v / 100); }
                else if (player && apiReady) { player.setVolume(v); }
                break;
            }
            case 'loop':
                looping = d.loop === true;
                vidEl.loop = looping;
                break;
            case 'stop':
                doStop();
                break;
        }
    });

    // ----------------------------------------------------------------
    // Drift-Korrektur: alle 3s Soll- vs. Istposition vergleichen.
    // Kostet praktisch nichts (2 Zahlenvergleiche pro Tick), hält aber
    // mehrere Screens trotz unterschiedlichem Buffering synchron.
    // ----------------------------------------------------------------
    setInterval(function () {
        if (syncBase === null) return;
        const target = (Date.now() - syncBase) / 1000;

        // YouTube: harter Seek erst ab >1s Abweichung (Seek = kurzes Buffern)
        if (curVideo && player && apiReady
            && player.getPlayerState && player.getPlayerState() === YT.PlayerState.PLAYING) {
            const dur = player.getDuration ? (player.getDuration() || 0) : 0;
            let t = target;
            if (looping && dur > 0) { t = target % dur; }
            if (!(!looping && dur > 0 && t >= dur)) {
                if (Math.abs(player.getCurrentTime() - t) > 1.0) {
                    player.seekTo(t, true);
                }
            }
        }

        // Videodatei: kleine Drift unhörbar über Abspielgeschwindigkeit
        // angleichen (3%), nur große Sprünge per Seek
        if (vidEl.style.display === 'block' && !vidEl.paused
            && isFinite(vidEl.duration) && vidEl.duration > 0) {
            const t = looping ? (target % vidEl.duration) : Math.min(target, vidEl.duration);
            const drift = vidEl.currentTime - t;
            if (Math.abs(drift) > 0.8) {
                vidEl.currentTime = t + 0.05;
                vidEl.playbackRate = 1;
            } else if (Math.abs(drift) > 0.15) {
                vidEl.playbackRate = drift > 0 ? 0.97 : 1.03;
            } else if (vidEl.playbackRate !== 1) {
                vidEl.playbackRate = 1;
            }
        }
    }, 3000);
</script>
</body>
</html>
